<div class="mesh-bg">
  <div class="blob blob-violet"></div>
  <div class="blob blob-emerald"></div>
  <div class="blob blob-pink"></div>
</div>

<div class="shell">
  <aside class="sidebar glass-card">
    <h1 class="brand gradient-text">TechFlow</h1>
    <p class="role">{{ auth.fullName() }}  {{ auth.role() }}</p>

    <nav class="nav">
      @for (link of links; track link.path) {
      <a [routerLink]="link.path" routerLinkActive="active" class="nav-link">
        {{ link.label }}
      </a>
      }
    </nav>
  </aside>

  <section class="content">
    <header class="topbar glass-card">
      <div>
        <p class="title">Workspace</p>
        <p class="subtitle">Next phase pages connected to your API</p>
      </div>
      <button class="btn btn-ghost" type="button" (click)="auth.logout()">Logout</button>
    </header>

    <main class="main">
      <router-outlet></router-outlet>
    </main>
  </section>
</div>
